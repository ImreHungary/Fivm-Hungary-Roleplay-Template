  - action: write_file
    file: ./resources/[nightlife]/nightlife_documents/server.lua
    data: |
      local ESX = exports['es_extended']:getSharedObject()

      local function hasJob(xPlayer, jobs)
          if not jobs then return true end
          if not xPlayer or not xPlayer.job then return false end

          local requiredGrade = jobs[xPlayer.job.name]
          if requiredGrade == nil then return false end

          return (xPlayer.job.grade or 0) >= requiredGrade
      end

      local function getPlayerNameData(xPlayer, source)
          local fullName = GetPlayerName(source)

          if xPlayer and xPlayer.getName then
              local ok, result = pcall(function()
                  return xPlayer.getName()
              end)

              if ok and result and result ~= '' then
                  fullName = result
              end
          end

          local firstName, lastName = fullName:match('^(%S+)%s+(.+)$')
          return fullName, firstName or fullName, lastName or ''
      end

      local function shortIdentifier(identifier)
          identifier = identifier or 'unknown'
          return identifier:gsub(':', ''):sub(-8):upper()
      end

      local function makeMetadata(source, xPlayer, def)
          local fullName, firstName, lastName = getPlayerNameData(xPlayer, source)
          local identifier = xPlayer and xPlayer.identifier or GetPlayerIdentifier(source, 0)
          local serial = ('NL-%s-%s'):format(os.date('%Y'), shortIdentifier(identifier))

          return {
              label = def.label,
              description = ('NÃĐv: %s\nAzonosÃ­tÃģ: %s\nKiadva: %s\nSzerver: %s'):format(fullName, serial, os.date('%Y-%m-%d'), Config.ServerName),
              type = def.label,
              firstname = firstName,
              lastname = lastName,
              name = fullName,
              serial = serial,
              issued = os.date('%Y-%m-%d'),
              server = Config.ServerName
          }
      end

      RegisterNetEvent('nightlife_documents:give', function(docType)
          local source = source
          local xPlayer = ESX.GetPlayerFromId(source)
          local def = Config.Documents[docType]

          if not def then
              TriggerClientEvent('nightlife_documents:notify', source, 'Nightlife iratok', 'Ismeretlen irat tÃ­pus.', 'error')
              return
          end

          if not hasJob(xPlayer, def.jobs) then
              TriggerClientEvent('nightlife_documents:notify', source, 'Nightlife iratok', 'Ehhez nincs jogosultsÃĄgod.', 'error')
              return
          end

          local metadata = makeMetadata(source, xPlayer, def)
          local canCarry = exports.ox_inventory:CanCarryItem(source, def.item, 1)

          if not canCarry then
              TriggerClientEvent('nightlife_documents:notify', source, 'Nightlife iratok', 'Nincs elÃĐg hely az inventorydban.', 'error')
              return
          end

          exports.ox_inventory:AddItem(source, def.item, 1, metadata)
          TriggerClientEvent('nightlife_documents:notify', source, 'Nightlife iratok', def.label .. ' kiadva.', 'success')
      end)

      local function documentText(metadata)
          metadata = metadata or {}

          return ('**TÃ­pus:** %s\n**NÃĐv:** %s\n**AzonosÃ­tÃģ:** %s\n**Kiadva:** %s\n**Szerver:** %s'):format(
              metadata.type or metadata.label or 'Irat',
              metadata.name or 'Ismeretlen',
              metadata.serial or 'N/A',
              metadata.issued or 'N/A',
              metadata.server or Config.ServerName
          )
      end

      local function showNearby(source, title, content)
          local srcPed = GetPlayerPed(source)
          local srcCoords = GetEntityCoords(srcPed)

          TriggerClientEvent('nightlife_documents:display', source, title, content)

          for _, playerId in ipairs(GetPlayers()) do
              local target = tonumber(playerId)

              if target and target ~= source then
                  local targetPed = GetPlayerPed(target)
                  local targetCoords = GetEntityCoords(targetPed)

                  if #(srcCoords - targetCoords) <= 3.0 then
                      TriggerClientEvent('nightlife_documents:display', target, title, content)
                  end
              end
          end
      end

      exports('showDocument', function(event, item, inventory, slot, data)
          if event ~= 'usedItem' then return end

          local source = inventory.id
          local slotData = exports.ox_inventory:GetSlot(source, slot)
          local metadata = slotData and slotData.metadata or {}

          local title = metadata.type or item.label or 'Nightlife irat'
          showNearby(source, title, documentText(metadata))
      end)

